name: Verify-and-Build
on: [push, workflow_dispatch]
jobs:
  verify:
    name: Verify Battle Plan v1.6
    runs-on: ubuntu-latest
    container: sagemath/sagemath:latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Battle Plan v1.6
        run: sage bin/verify_battleplan_v1.6.sage
  
  build-pdf:
    name: Build PDF
    needs: verify  # "No μ-bound → No build" - only runs if verify passes
    runs-on: ubuntu-latest
    container: texlive/texlive:latest
    steps:
      - uses: actions/checkout@v4
      - name: Build PDF
        run: |
          cd paper
          latexmk -pdf -interaction=nonstopmode lindelof.tex
      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lindelof-mu-bound-v1.6-verified
          path: paper/lindelof.pdf
          retention-days: 90
