name: Build-pdf
on: [push, workflow_dispatch]
jobs:
  verify-and-build:
    runs-on: ubuntu-latest
    container: sagemath/sagemath:latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Battle Plan v1.6
        run: sage bin/verify_battleplan_v1.6.sage
      - name: Build PDF
        if: success()
        run: |
          cd paper
          pdflatex lindelof.tex
